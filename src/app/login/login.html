<div class="container-fluid vh-100 d-flex align-items-center justify-content-center bg-light">

    <div class="row w-100 justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4 text-center">

            <h1 class="display-6 fw-normal text-dark mb-1">Login</h1>
            <p class="text-muted small mb-4">Explore 100+ recipes in your hand...</p>

            <div class="card border-0 shadow-sm p-4 rounded-3">
                <div class="card-body p-2">

                    <div class="d-flex align-items-center justify-content-center mb-4">
                        <i class="bi bi-utensils fs-3 me-2"></i>
                        <span class="h3 mb-0 fw-semibold text-secondary">Recipe-Hub</span>
                    </div>

                    <form [formGroup]="loginForm" (ngSubmit)="login()">
                        <div class="mb-3">
                            <input type="email" name="email" class="form-control bg-white py-2"
                                placeholder="Enter Your Email" formControlName="email">
                        </div>
                        @if (loginForm.get('email')?.errors && loginForm.get('email')?.touched){
                        <div class="text-danger fw-bolder">
                            *Invalid Email
                        </div>
                        }

                        <div class="mb-4">
                            <input type="password" name="password" class="form-control bg-white py-2"
                                placeholder="Enter Your password" formControlName="password">
                        </div>
                        @if (loginForm.get('password')?.errors && loginForm.get('password')?.touched){
                        <div class="text-danger fw-bolder">
                            *Invalid Password
                        </div>
                        }

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success py-2 border-0"
                                style="background-color: #1a8754;">
                                Login
                            </button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
